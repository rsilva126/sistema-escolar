<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Professor x Turma x Disciplina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebarInstitucional"></div>

    <main class="main">
        <div th:replace="fragments/topbar :: topbarInstitucional"></div>

        <div class="container">
            <div class="table-header">
                <div class="table-header-left">
                    <h2>Professor x Turma x Disciplina</h2>
                    <p>Cadastre os vínculos que serão usados no diário escolar.</p>
                    <div class="actions" style="margin-top:10px;">
                        <span class="stat-chip">📘 Vínculos: <span th:text="${totalItens}">0</span></span>
                    </div>
                </div>

                <div class="table-header-right">
                    <a href="/professor-turma-disciplina/novo" class="btn">Novo Vínculo</a>
                    <a href="/" class="btn btn-secondary">Voltar</a>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Professor</th>
                        <th>Turma</th>
                        <th>Disciplina</th>
                        <th>Ano Letivo</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${vinculos}">
                        <td th:text="${item.id}"></td>
                        <td th:text="${item.professor}"></td>
                        <td th:text="${item.turma}"></td>
                        <td th:text="${item.disciplina}"></td>
                        <td th:text="${item.anoLetivo}"></td>
                        <td th:text="${item.status}"></td>
                        <td>
                            <div class="action-group">
                                <a th:href="@{/professor-turma-disciplina/editar/{id}(id=${item.id})}" class="action-link action-edit">Editar</a>
                                <a th:href="@{/professor-turma-disciplina/excluir/{id}(id=${item.id})}"
                                   class="action-link action-delete"
                                   onclick="return confirm('Deseja realmente excluir este vínculo?');">Excluir</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(vinculos)}">
                        <td colspan="7" style="text-align:center; padding:20px;">Nenhum vínculo encontrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="toast-container">
                <div th:if="${mensagemSucesso}" class="toast toast-success" id="toastSucesso">
                    <span th:text="${mensagemSucesso}"></span>
                </div>
                <div th:if="${mensagemErro}" class="toast toast-error" id="toastErro">
                    <span th:text="${mensagemErro}"></span>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const toastSucesso = document.getElementById("toastSucesso");
const toastErro = document.getElementById("toastErro");
function esconderToast(toast) {
    if (toast) {
        setTimeout(() => { toast.style.opacity = "0"; }, 2500);
        setTimeout(() => { toast.remove(); }, 3000);
    }
}
esconderToast(toastSucesso);
esconderToast(toastErro);
</script>
</body>
</html>
