<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turmas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="layout">
    <div th:replace="fragments/sidebar :: sidebarInstitucional"></div>

    <main class="main">
        <div th:replace="fragments/topbar :: topbarInstitucional"></div>

        <div class="container">

            <div class="page-header">
                <div>
                    <h1>Turmas</h1>
                    <p class="page-description">
                        Gerencie a organização das turmas por série, turno, escola e ano letivo.
                    </p>
                </div>

                <div class="table-header-right">
                    <a href="/turmas/novo" class="btn">Nova Turma</a>
                    <a href="/" class="btn btn-secondary">Voltar</a>
                </div>
            </div>

            <p th:if="${mensagemSucesso}" th:text="${mensagemSucesso}" class="message-success"></p>
            <p th:if="${mensagemErro}" th:text="${mensagemErro}" class="message-error"></p>

            <form method="get" action="/turmas-view" class="filter-panel">
                <h3 class="filter-panel-title">Filtros de consulta</h3>

                <div class="filter-grid">
                    <div class="filter-field">
                        <label for="busca">Nome da turma</label>
                        <input type="text"
                               id="busca"
                               name="busca"
                               th:value="${busca}"
                               placeholder="Digite o nome da turma">
                    </div>

                    <div class="filter-field">
                        <label for="escolaId">Escola</label>
                        <select id="escolaId" name="escolaId">
                            <option value="">Todas</option>
                            <option th:each="escola : ${escolas}"
                                    th:value="${escola.id}"
                                    th:text="${escola.nome}"
                                    th:selected="${escolaId != null and escola.id == escolaId}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn">Aplicar</button>
                    <a href="/turmas-view" class="btn btn-secondary">Limpar</a>
                </div>
            </form>

            <div class="active-filters"
                 th:if="${(busca != null and !#strings.isEmpty(busca)) or (escolaId != null)}">

                <div class="active-filter-chip"
                     th:if="${busca != null and !#strings.isEmpty(busca)}">
                    <span class="active-filter-label">Turma:</span>
                    <span th:text="${busca}"></span>
                </div>

                <div class="active-filter-chip"
                     th:if="${escolaId != null}">
                    <span class="active-filter-label">Escola:</span>
                    <span th:text="${nomeEscolaFiltro}"></span>
                </div>
            </div>

            <div class="actions" style="margin-bottom: 16px;">
                <span class="stat-chip">
                    Turmas encontradas: <span th:text="${totalItens}">0</span>
                </span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Série</th>
                        <th>Turno</th>
                        <th>Ano Letivo</th>
                        <th>Escola</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="turma : ${turmas}">
                        <td th:text="${turma.id}"></td>
                        <td th:text="${turma.nome}"></td>
                        <td th:text="${turma.serie}"></td>
                        <td th:text="${turma.turno}"></td>
                        <td th:text="${turma.anoLetivo}"></td>
                        <td th:text="${turma.escola}"></td>
                        <td th:text="${turma.status}"></td>

                        <td>
                            <div class="action-group">
                                <a th:href="@{/turmas/editar/{id}(id=${turma.id})}"
                                   class="action-link action-edit">
                                    Editar
                                </a>

                                <a th:href="@{/turmas/excluir/{id}(id=${turma.id})}"
                                   class="action-link action-delete"
                                   onclick="return confirm('Deseja realmente excluir esta turma?');">
                                    Excluir
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(turmas)}">
                        <td colspan="8" class="text-center">Nenhuma turma encontrada.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="toast-container">
                <div th:if="${mensagemSucesso}" class="toast toast-success" id="toastSucesso">
                    <span th:text="${mensagemSucesso}"></span>
                </div>

                <div th:if="${mensagemErro}" class="toast toast-error" id="toastErro">
                    <span th:text="${mensagemErro}"></span>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    const toastSucesso = document.getElementById("toastSucesso");
    const toastErro = document.getElementById("toastErro");

    function esconderToast(toast) {
        if (toast) {
            setTimeout(() => {
                toast.style.opacity = "0";
            }, 2500);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    }

    esconderToast(toastSucesso);
    esconderToast(toastErro);
</script>

</body>
</html>
