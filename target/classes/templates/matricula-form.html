<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Matrícula</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="layout"><div th:replace="fragments/sidebar :: sidebarInstitucional"></div><main class="main"><div th:replace="fragments/topbar :: topbarInstitucional"></div><div class="container form-card"><p th:if="${erro}" th:text="${erro}" class="message-error"></p><h1 class="form-title" th:text="${modoEdicao} ? 'Editar Matrícula' : 'Cadastrar Matrícula'">Matrícula</h1><p class="form-subtitle">Preencha os dados da matrícula.</p><form th:action="@{/matriculas/salvar}" th:object="${matricula}" method="post"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="form-field"><label>Aluno</label><select th:field="*{alunoId}"><option value="">Selecione</option><option th:each="aluno : ${alunos}" th:value="${aluno.id}" th:text="${aluno.nome}"></option></select></div><div class="form-field"><label>Turma</label><select th:field="*{turmaId}"><option value="">Selecione</option><option th:each="turma : ${turmas}" th:value="${turma.id}" th:text="${turma.nome}"></option></select></div><div class="form-field"><label>Ano Letivo</label><select th:field="*{anoLetivoId}"><option value="">Selecione</option><option th:each="ano : ${anosLetivos}" th:value="${ano.id}" th:text="${ano.descricao}"></option></select></div><div class="form-field"><label>Data da Matrícula</label><input type="date" th:field="*{dataMatricula}"></div><div class="form-field"><label>Situação</label><select th:field="*{situacao}"><option value="ATIVA">ATIVA</option><option value="INATIVA">INATIVA</option><option value="TRANSFERIDA">TRANSFERIDA</option><option value="CANCELADA">CANCELADA</option></select></div><div class="form-field"><label>Número da Matrícula</label><input type="text" th:field="*{numeroMatricula}"></div></div><div class="form-actions"><button type="submit" class="btn" th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'"></button><a href="/matriculas-view" class="btn btn-secondary">Voltar</a></div></form></div></main></div></body></html>
