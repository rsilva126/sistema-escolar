<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Turma</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="layout"><div th:replace="fragments/sidebar :: sidebarInstitucional"></div><main class="main"><div th:replace="fragments/topbar :: topbarInstitucional"></div><div class="container form-card"><p th:if="${erro}" th:text="${erro}" class="message-error"></p><h1 class="form-title" th:text="${modoEdicao} ? 'Editar Turma' : 'Cadastrar Turma'">Turma</h1><p class="form-subtitle">Preencha os dados da turma.</p><form th:action="@{/turmas/salvar}" th:object="${turma}" method="post"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="form-field"><label>Nome da Turma</label><input type="text" th:field="*{nome}" required></div><div class="form-field"><label>Série</label><select th:field="*{serieId}"><option value="">Selecione</option><option th:each="serie : ${series}" th:value="${serie.id}" th:text="${serie.nome}"></option></select></div><div class="form-field"><label>Turno</label><select th:field="*{turnoId}"><option value="">Selecione</option><option th:each="turno : ${turnos}" th:value="${turno.id}" th:text="${turno.nome}"></option></select></div><div class="form-field"><label>Ano Letivo</label><select th:field="*{anoLetivoId}"><option value="">Selecione</option><option th:each="ano : ${anosLetivos}" th:value="${ano.id}" th:text="${ano.descricao}"></option></select></div><div class="form-field"><label>Escola</label><select th:field="*{escolaId}"><option value="">Selecione</option><option th:each="escola : ${escolas}" th:value="${escola.id}" th:text="${escola.nome}"></option></select></div><div class="form-field"><label>Status</label><select th:field="*{status}"><option value="ATIVA">ATIVA</option><option value="INATIVA">INATIVA</option></select></div></div><div class="form-actions"><button type="submit" class="btn" th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'"></button><a href="/turmas-view" class="btn btn-secondary">Voltar</a></div></form></div></main></div></body></html>
