<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuário</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="layout">
    <div th:replace="fragments/sidebar :: sidebarInstitucional"></div>

    <main class="main">
        <div th:replace="fragments/topbar :: topbarInstitucional"></div>

        <div class="container form-card">
            <p th:if="${erro}" th:text="${erro}" class="message-error"></p>

            <h1 class="form-title" th:text="${modoEdicao} ? 'Editar Usuário' : 'Cadastrar Usuário'">Usuário</h1>
            <p class="form-subtitle">Preencha os dados do usuário do sistema.</p>

            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-grid">
                    <div class="form-field">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}" required>
                    </div>

                    <div class="form-field">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" th:field="*{cpf}">
                    </div>

                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" required>
                    </div>

                    <div class="form-field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" th:field="*{senha}">
                    </div>

                    <div class="form-field">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" th:field="*{telefone}">
                    </div>

                    <div class="form-field">
                        <label for="escolaId">Escola</label>
                        <select id="escolaId" th:field="*{escolaId}" required>
                            <option value="">Selecione</option>
                            <option th:each="escola : ${escolas}"
                                    th:value="${escola.id}"
                                    th:text="${escola.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="funcao">Função</label>
                        <select id="funcao" th:field="*{funcao}" required>
                            <option value="">Selecione</option>
                            <option value="PROFESSOR">PROFESSOR</option>
                            <option value="SECRETARIO">SECRETÁRIO</option>
                            <option value="DIRETOR">DIRETOR</option>
                            <option value="COORDENADOR">COORDENADOR</option>
                            <option value="ADMINISTRADOR">ADMINISTRADOR</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="status">Status</label>
                        <select id="status" th:field="*{status}">
                            <option value="ATIVO">ATIVO</option>
                            <option value="INATIVO">INATIVO</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn" th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'">Salvar</button>
                    <a href="/usuarios-view" class="btn btn-secondary">Voltar</a>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
